<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B7B4E"/>
      <stop offset="100%" stop-color="#145F3A"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pinGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle decorative grid dots in background -->
  <g fill="#FFFFFF" opacity="0.04">
    <circle cx="50" cy="50" r="1.5"/>
    <circle cx="120" cy="50" r="1.5"/>
    <circle cx="190" cy="50" r="1.5"/>
    <circle cx="260" cy="50" r="1.5"/>
    <circle cx="50" cy="450" r="1.5"/>
    <circle cx="120" cy="450" r="1.5"/>
    <circle cx="50" cy="380" r="1.5"/>
    <circle cx="120" cy="380" r="1.5"/>
  </g>

  <!-- LEFT: Brand block -->
  <g transform="translate(60, 95)">
    <!-- App icon: white rounded square with green lightning bolt -->
    <g filter="url(#iconShadow)">
      <rect x="0" y="0" width="120" height="120" rx="24" fill="#FFFFFF"/>
      <g transform="translate(13, 10)">
        <polygon points="55,5 20,55 45,55 35,95 75,40 50,40"
                 fill="#1B7B4E" stroke="#1B7B4E"
                 stroke-width="1.5" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- App name -->
    <text x="0" y="200"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="62" font-weight="800" fill="#FFFFFF"
          letter-spacing="-1.5">PlugMeNow</text>

    <!-- Tagline -->
    <text x="0" y="248"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="28" font-weight="500" fill="#FFFFFF" opacity="0.95">Βρες φορτιστή, τώρα!</text>

    <!-- Sub-features -->
    <text x="0" y="298"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-size="18" font-weight="400" fill="#FFFFFF" opacity="0.78">~4.000+ σταθμοί · 16 δίκτυα · Δωρεάν</text>
  </g>

  <!-- RIGHT: Greece silhouette + charging station pins -->
  <g transform="translate(560, 50) scale(2.0)">
    <!-- Mainland silhouette (stylized Y-peninsula) -->
    <path d="M 30,15 L 70,10 L 110,18 L 140,25 L 145,18 L 150,30 L 170,22 L 175,40 L 165,55 L 175,70 L 170,90 L 155,85 L 150,100 L 130,105 L 115,125 L 95,130 L 85,115 L 70,120 L 55,105 L 45,90 L 30,75 L 20,55 L 25,35 Z"
          fill="#FFFFFF" opacity="0.16"/>
    <!-- Crete -->
    <ellipse cx="115" cy="160" rx="28" ry="5" fill="#FFFFFF" opacity="0.16"/>
    <!-- Aegean islands -->
    <circle cx="180" cy="100" r="3" fill="#FFFFFF" opacity="0.20"/>
    <circle cx="192" cy="80" r="2" fill="#FFFFFF" opacity="0.20"/>
    <circle cx="195" cy="115" r="3" fill="#FFFFFF" opacity="0.20"/>
    <circle cx="170" cy="135" r="2.5" fill="#FFFFFF" opacity="0.20"/>
    <circle cx="200" cy="142" r="2" fill="#FFFFFF" opacity="0.20"/>

    <!-- Charging station pins (golden yellow, with subtle glow) -->
    <g filter="url(#pinGlow)">
      <!-- Athens -->
      <circle cx="155" cy="92" r="5.5" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Thessaloniki -->
      <circle cx="115" cy="22" r="5.5" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Patras -->
      <circle cx="92" cy="100" r="4.5" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Heraklion (Crete) -->
      <circle cx="115" cy="160" r="4.5" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Larissa -->
      <circle cx="118" cy="55" r="4" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Volos -->
      <circle cx="148" cy="70" r="4" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Ioannina -->
      <circle cx="55" cy="55" r="4" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
      <!-- Rhodes -->
      <circle cx="200" cy="118" r="4" fill="#FFD93D" stroke="#FFFFFF" stroke-width="1.2"/>
    </g>
  </g>

  <!-- Bottom-right credit -->
  <text x="1000" y="478"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="14" font-weight="400" fill="#FFFFFF" opacity="0.7"
        text-anchor="end">by AiSmartly · viralev.gr</text>
</svg>
